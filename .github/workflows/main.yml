name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  prepare:
    name: Prepare
    uses: projek-xyz/actions/.github/workflows/configure.yml@main
    secrets: inherit
    with:
      php-version: 8.1

    permissions:
      pull-requests: write
      contents: read

  tests:
    name: with WP ${{ matrix.wp }} on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: [prepare]
    outputs:
      should-upload: ${{ steps.dist-archive.outputs.should-upload }}

    env:
      DB_NAME: ${{ github.repository_owner }}
      DB_USER: ${{ github.repository_owner }}
      DB_PASS: secret
      PHP_VERSION: ${{ matrix.php }}
      WP_VERSION: ${{ matrix.wp }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.DB_PASS }}
          MYSQL_DATABASE: ${{ env.DB_NAME }}
          MYSQL_USER: ${{ env.DB_USER }}
          MYSQL_PASSWORD: ${{ env.DB_PASS }}
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1']
        wp: ['6.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3.10' }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: xdebug

      - name: Set up Composer cache
        uses: actions/cache@v5
        with:
          path: ${{ needs.prepare.outputs.composer-cache-dir }}
          key: composer-php${{ env.PHP_VERSION }}-wp${{ env.WP_VERSION }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-php${{ env.PHP_VERSION }}-wp${{ env.WP_VERSION }}-

      - name: Set up WP-CLI cache
        uses: actions/cache@v5
        with:
          path: /home/runner/.wp-cli/cache
          key: wpcli-wp${{ env.WP_VERSION }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: wpcli-wp${{ env.WP_VERSION }}-

      - name: Install dependencies
        run: |
          composer update

      - name: Set up WordPress
        shell: bash
        env:
          DB_HOST: 127.0.0.1:${{ job.services.mysql.ports['3306'] }}
          MULTISITE_ENABLED: 0
          SITE_PLUGINS: blocksy-companion,jetpack,contact-form-7,plugin-check,woocommerce
          SITE_THEMES: blocksy
          SITE_DEFAULT_THEME: custom-theme
        run: |
          scripts/init-wp.sh

      # - name: Lint
      #   run: |
      #     vendor/bin/phpcs

      - name: Unit Test
        run: |
          vendor/bin/phpunit --coverage-text

      - name: Make dist archive
        id: dist-archive
        if: |-
          github.event_name == 'push' && github.ref_name == 'main' &&
          startsWith(github.event.head_commit.message, 'chore(release):')
        env:
          FORWARD_DB_PORT: ${{ job.services.mysql.ports['3306'] }}
        run: |
          scripts/make-dist.sh

          echo "should-upload=1" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        if: steps.dist-archive.outputs.should-upload == '1'
        with:
          name: release-archives
          overwrite: true
          path: assets/dist

  update-releases:
    name: Update released assets
    needs: tests
    if: needs.tests.outputs.should-upload == '1'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-archives
          path: releases

      - name: Update release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LATEST_COMMIT: ${{ github.event.head_commit.message }}
        run: |
          RELEASE_VERSION=$(echo "$LATEST_COMMIT" | head -n 1 | sed 's/chore(release): /v/')

          for _ in {1..10}; do
            echo "Checking for release $RELEASE_VERSION to be available..."
            gh release view "$RELEASE_VERSION" >/dev/null 2>&1 && break
            sleep 5s
          done

          gh release view "$RELEASE_VERSION" >/dev/null 2>&1 || {
            echo "Release $RELEASE_VERSION is not available yet"
            exit 0
          }

          shopt -s nullglob

          for to_upload in releases/*.zip; do
            [[ -z "$to_upload" || ! -f "$to_upload" ]] && continue

            echo "Uploading $to_upload..."
            gh release upload "$RELEASE_VERSION" "${to_upload}" --clobber
          done
