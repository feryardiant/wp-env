name: Static

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployed.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: assets/dist
        name: release-archives
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}
        merge-multiple: true

    - name: Prepare
      shell: bash
      run: |
        cp assets/*.{html,png,svg,ico} assets/dist/
        cp assets/.nojekyll assets/dist/

    - name: Store
      uses: actions/upload-pages-artifact@v5
      with:
        path: assets/dist
        include-hidden-files: true

    - name: Deploy
      id: deployed
      uses: actions/deploy-pages@v5
      with:
        token: ${{ github.token }}
